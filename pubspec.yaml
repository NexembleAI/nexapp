name: traccar_client
description: "Traccar Client"
publish_to: 'none'
version: 10.0.0+140

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  traccar_client_sdk: ^0.0.25
  shared_preferences: ^2.5.5
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  quick_actions: ^1.1.0
  shared_preferences_android: ^2.4.23
  flutter_secure_storage: ^10.2.0
  app_links: ^7.0.0
  flutter_svg: ^2.0.17
  flutter_appauth: ^12.0.2
  device_info_plus: ^11.1.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  record: ^6.0.0
  path_provider: ^2.1.0
  just_audio: ^0.10.0
  sqflite: ^2.3.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/certs/nexemble_ca.pem

flutter_launcher_icons:
  ios: true
  android: "ic_launcher"
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true
